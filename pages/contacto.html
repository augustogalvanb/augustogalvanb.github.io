        <nav>
            <ul>

                </li>
            </ul>
            <button id="theme-toggle"><i class="fas fa-sun"></i></button>
        </nav>
    </header>
    <main>
        <h1>Contacto</h1>
    <article>
        <section class="social-links">
            <h2>Mis redes</h2>
            <ul>
                <li>
                    <a href="https://www.linkedin.com/in/augustogalvanb/" target="_blank" rel="noopener noreferrer">Linkedin</a>
                </li>
                <li>
                    <a href="https://github.com/augustogalvanb" target="_blank" rel="noopener noreferrer">Github</a>
                </li>
            </ul>
        </section>
        <section class="contact-form">
            <h2>Envíame un mensaje</h2>
            <form id="contact-form" action="/send-email" method="post">
                <label for="email">Ingrese su correo electrónico</label>
                <input type="email" id="email" name="email" required>
                <label for="subject">Asunto</label>
                <input type="text"id="subject" name="subject" required>
                <label for="message">Mensaje</label>
                <textarea id="message" name="message" rows="5" required></textarea>
                <div class="button-container">
                    <button type="submit">Enviar</button>
                    <div id="spinner" class="spinner" style="display: none;"></div> <!-- Spinner oculto por defecto -->
                </div>
            </form>
            <p id="form-message" style="display: none;"></p>
        </section>
    </article>
    </main>
    <script src="../scripts/contacto.js"></script>
    <script src="../scripts/theme.js"></script>
</body>
</html>
